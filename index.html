<!-- 4. Lógica del sitio (inline — ligero, sin dependencias externas) -->
<script>
/* ─── Navbar scroll ─── */
(function() {
  const navbar = document.getElementById('navbar');
  function onScroll() {
    navbar.classList.toggle('solid', window.scrollY > 30);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();

/* ─── Mobile menu ─── */
let mobileOpen = false;
function toggleMobile() {
  mobileOpen = !mobileOpen;
  const menu   = document.getElementById('mobileMenu');
  const burger = document.getElementById('burger');
  const b1 = document.getElementById('b1'),
        b2 = document.getElementById('b2'),
        b3 = document.getElementById('b3');

  menu.classList.toggle('open', mobileOpen);
  menu.setAttribute('aria-hidden', String(!mobileOpen));
  burger.setAttribute('aria-expanded', String(mobileOpen));
  document.body.style.overflow = mobileOpen ? 'hidden' : '';

  if (mobileOpen) {
    b1.style.cssText = 'transform:rotate(45deg) translate(5px,5px)';
    b2.style.opacity = '0';
    b3.style.cssText = 'transform:rotate(-45deg) translate(5px,-5px)';
  } else {
    b1.style.cssText = b2.style.cssText = b3.style.cssText = '';
  }
}
function closeMobile() {
  mobileOpen = false;
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('mobileMenu').setAttribute('aria-hidden', 'true');
  document.getElementById('b1').style.cssText = '';
  document.getElementById('b2').style.cssText = '';
  document.getElementById('b3').style.cssText = '';
  document.body.style.overflow = '';
}
// Cerrar al clickear fuera
document.addEventListener('click', function(e) {
  if (mobileOpen && !e.target.closest('#mobileMenu') && !e.target.closest('#burger')) {
    closeMobile();
  }
});

/* ─── Hero Slider ─── */
let currentSlide = 0;
let totalSlides = 3;
let sliderInterval;

function goSlide(idx) {
  const slides   = document.querySelectorAll('.hero-slide');
  const contents = document.querySelectorAll('.hero-slide-content');
  const dots     = document.querySelectorAll('.hero-dot');

  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  contents.forEach((c, i) => c.classList.toggle('active', i === idx));
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  currentSlide = idx;
}

function nextSlide() {
  goSlide((currentSlide + 1) % totalSlides);
}

// Llamado desde config-injector después de construir slides
function initHeroSlider(total, interval) {
  totalSlides = total || 3;
  clearInterval(sliderInterval);
  sliderInterval = setInterval(nextSlide, interval || 5500);
  // Activar primer slide content
  const contents = document.querySelectorAll('.hero-slide-content');
  if (contents[0]) contents[0].classList.add('active');
}

// Fallback si injector no lo llama
document.addEventListener('configInjected', function() {
  const slides = document.querySelectorAll('.hero-slide');
  if (slides.length && !sliderInterval) {
    initHeroSlider(slides.length, 5500);
  }
});

/* ─── Toast ─── */
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

/* ─── Modal ─── */
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function submitForm() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const tel    = document.getElementById('f-tel').value.trim();
  const tipo   = document.getElementById('f-tipo').value;
  const cant   = document.getElementById('f-cant').value;
  const plazo  = document.getElementById('f-plazo').value;
  const desc   = document.getElementById('f-desc').value.trim();

  const msg = encodeURIComponent(
    `¡Hola Antoni Sport! Quiero hacer un pedido:\n\n` +
    `👤 Nombre: ${nombre || 'No indicado'}\n` +
    `📱 Teléfono: ${tel || 'No indicado'}\n` +
    `👕 Tipo: ${tipo}\n` +
    `🔢 Cantidad: ${cant || 'Por definir'} piezas\n` +
    `📅 Plazo: ${plazo}\n` +
    `📝 Descripción: ${desc || 'Sin descripción adicional'}`
  );

  closeModal();
  window.open(`https://wa.me/5950983038787?text=${msg}`, '_blank', 'noopener');
  showToast('✅ ¡Redirigiendo a WhatsApp!');
}

/* ─── Bento navigation ─── */
function navigateCat(cat) {
  const el = document.getElementById('mosaico');
  if (el) {
    const top = el.getBoundingClientRect().top + window.scrollY - 80;
    window.scrollTo({ top, behavior: 'smooth' });
  }
}

/* ─── Scroll reveal con IntersectionObserver ─── */
(function() {
  const els = document.querySelectorAll('[data-anim]');
  const obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) entry.target.classList.add('in');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  els.forEach(function(el) { obs.observe(el); });

  // Re-observar después de inyección
  document.addEventListener('configInjected', function() {
    requestAnimationFrame(function() {
      document.querySelectorAll('[data-anim]:not(.observed)').forEach(function(el) {
        el.classList.add('observed');
        obs.observe(el);
      });
    });
  });
})();

/* ─── Smooth scroll para todos los links internos ─── */
document.addEventListener('click', function(e) {
  const link = e.target.closest('a[href^="#"]');
  if (!link) return;
  const href = link.getAttribute('href');
  if (!href || href === '#') return;
  const target = document.querySelector(href);
  if (!target) return;
  e.preventDefault();
  if (mobileOpen) closeMobile();
  const navH = document.getElementById('navbar').offsetHeight || 72;
  const top = target.getBoundingClientRect().top + window.scrollY - navH - 8;
  window.scrollTo({ top, behavior: 'smooth' });
});

/* ─── Iniciar config injector ─── */
ConfigInjector.init();
</script>
